name: Refresh dashboards/example.md

# Regenerates the sample dashboard so the repo always shows a current
# example reflecting the latest dashboard code. Runs only on changes to
# dashboard source, importer code, or the bundled examples.
on:
  push:
    branches: [main]
    paths:
      - 'network_chief/dashboard.py'
      - 'network_chief/db.py'
      - 'network_chief/importers/**'
      - 'network_chief/scoring.py'
      - 'examples/**'
      - 'Makefile'
      - 'pyproject.toml'
      - '.github/workflows/dashboard-example.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: make test
      - name: Generate sample dashboard
        env:
          NETWORK_CHIEF_DB: /tmp/network-chief-example/network.db
        run: |
          set -euo pipefail
          rm -rf /tmp/network-chief-example
          mkdir -p /tmp/network-chief-example
          python -m network_chief init
          python -m network_chief add-goal \
            --title "Reactivate investor network" \
            --cadence weekly --capital-type financial \
            --target-segment investor \
            --success-metric "5 warm conversations"
          python -m network_chief import-linkedin --file examples/linkedin_connections_sample.csv
          python -m network_chief import-gmail-json --file examples/gmail_sample.json --mailbox-owner you@example.com
          python -m network_chief import-x --file examples/x_community_sample.json --owner-handle yourhandle
          python -m network_chief brief --limit 3 --no-drafts
          python -m network_chief dashboard --window 30 --out dashboards/example.md
      - name: Strip volatile timestamp from example dashboard
        run: |
          # Pin the captured_at line to a placeholder so commits are diff-stable.
          sed -i -E 's/_Captured at [^•]*•/_Captured at <generated by CI> •/' dashboards/example.md
      - name: Commit refreshed example.md
        run: |
          if git diff --quiet -- dashboards/example.md; then
            echo "No change to dashboards/example.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboards/example.md
          git commit -m "Refresh dashboards/example.md"
          git push
